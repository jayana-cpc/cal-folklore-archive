
services:
  db:
    image: jayanacpc/cal-map-search-db:latest
    build:
      context: .
      dockerfile: Dockerfile.mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kfl}
      MYSQL_USER: ${MYSQL_USER:-kfl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kflpass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: jayanacpc/cal-map-search-web:latest
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_USERNAME: ${DB_USERNAME:-kfl}
      DB_PASSWORD: ${DB_PASSWORD:-kflpass}
      DB_NAME: ${DB_NAME:-kfl}
      APP_HOST: ${APP_HOST:-http://localhost:8000/}
      APP_SECRET: ${APP_SECRET:-dev-secret}
      DEV_LOGIN: ${DEV_LOGIN:-1}
      BOX_ENABLED: ${BOX_ENABLED:-0}

volumes:
  db_data:
